name: CI

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'templates/**'
      - 'generator_packer.pkr.hcl'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'templates/**'
      - 'generator_packer.pkr.hcl'
      - '.github/workflows/ci.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with Ruff
        run: |
          ruff check . --output-format=github

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run generator script
        run: |
          python generate_packer.py --help

  packer-validate:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Packer
        uses: hashicorp/setup-hashicorp@v3
        with:
          packer: latest

      - name: Generate Packer HCL and validate
        run: |
          # Generate sample HCL if templates exist
          if [ -d "templates/configuration" ]; then
            python generate_packer.py || echo "No configurations found, skipping generation"
          fi
          
          # Validate existing HCL files
          for hcl in *.pkr.hcl generator_packer.pkr.hcl test-*.pkr.hcl; do
            if [ -f "$hcl" ]; then
              packer validate "$hcl" || exit 1
              echo "✓ Validated $hcl"
            fi
          done

